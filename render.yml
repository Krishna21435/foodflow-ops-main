databases:
  - name: foodflow-db
    plan: free

services:
  # 1) Auth Service
  - type: web
    name: auth-service
    runtime: docker
    rootDir: services/auth-service
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: foodflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2) Order Service
  - type: web
    name: order-service
    runtime: docker
    rootDir: services/order-service
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        fromDatabase:
          name: foodflow-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false

  # 3) Restaurant Service
  - type: web
    name: restaurant-service
    runtime: docker
    rootDir: services/restaurant-service
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        fromDatabase:
          name: foodflow-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false

  # 4) Delivery Service
  - type: web
    name: delivery-service
    runtime: docker
    rootDir: services/delivery-service
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: DATABASE_URL
        fromDatabase:
          name: foodflow-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false

  # 5) Ops Tracker Service (API + Socket.IO)
  - type: web
    name: ops-service
    runtime: docker
    rootDir: services/ops-tracker-service
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
      - key: DATABASE_URL
        fromDatabase:
          name: foodflow-db
          property: connectionString
      - key: RABBITMQ_URL
        sync: false

  # 6) API Gateway
  # NOTE: Paste full public URLs (https://...) in Render dashboard for these five vars.
  - type: web
    name: gateway
    runtime: docker
    rootDir: api-gateway
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: AUTH_SERVICE_URL
        sync: false
      - key: ORDER_SERVICE_URL
        sync: false
      - key: RESTAURANT_SERVICE_URL
        sync: false
      - key: DELIVERY_SERVICE_URL
        sync: false
      - key: OPS_SERVICE_URL
        sync: false

  # 7) Frontend
  - type: web
    name: frontend
    runtime: docker
    rootDir: frontend
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_GATEWAY_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
